<html>
  <head>
    <link rel="stylesheet" href="./styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  </head>
  <body>
    <header>
      <h1>What's for Dinner?</h1>
      <button id="addButton" class="buttons" type="button">Add A Recipe</button>
    </header>
    <form id="dinnerOptionsForm">
      <div id="dinnerOptions">
      <h2>What are you looking for?</h2>
      <input type="radio" value="side" id="side">
      <label for="side">Side</label>
      <br>
      <input type="radio" value="mainDish" id="mainDish">
      <label for="mainDish">Main Dish</label>
      <br>
      <input type="radio" value="dessert" id="dessert">
      <label for="dessert">Dessert</label>
      <br>
      <input type="radio" value="entireMeal" id="entireMeal">
      <label for="entireMeal">Entire Meal</label>
      <br>
      <button id="letsCookButton" class="buttons" type="button">Let's Cook!</button>
      </div>
    </form>
    <section id="titleDisplay">
      <img id="potIcon" src="./assets/cookpot.svg" alt="Pot icon">
    </section>
  </body>
  <script type="text/javascript" src="main.js"></script>
</html>
